name: url-shortener

services:
  web:
    image: ghcr.io/${GHCR_OWNER:-th11n}/${GHCR_REPO:-url-shortener}-web:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 3001
      NEXT_PUBLIC_SERVER_URL: https://api.shortener.dominikkrakowiak.com/rpc/v1
      NEXT_PUBLIC_BASE_URL: https://shortener.dominikkrakowiak.com
      NEXT_PUBLIC_ANALYTICS_URL: https://api.shortener.dominikkrakowiak.com
    depends_on:
      - server
      - analytics
    restart: unless-stopped

  server:
    image: ghcr.io/${GHCR_OWNER:-th11n}/${GHCR_REPO:-url-shortener}-server:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/url-shortener
      CORS_ORIGIN: https://shortener.dominikkrakowiak.com
      BETTER_AUTH_URL: https://api.shortener.dominikkrakowiak.com
      BETTER_AUTH_SECRET: change_me_to_a_long_random_secret_min_32_chars
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  analytics:
    image: ghcr.io/${GHCR_OWNER:-th11n}/${GHCR_REPO:-url-shortener}-analytics:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgresql://postgres:password@postgres:5432/url-shortener
      CORS_ORIGIN: https://shortener.dominikkrakowiak.com
      BETTER_AUTH_URL: https://api.shortener.dominikkrakowiak.com
      BETTER_AUTH_SECRET: change_me_to_a_long_random_secret_min_32_chars
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_CLICK_EXCHANGE: clicks
      RABBITMQ_CLICK_QUEUE: clicks.insert.v1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ghcr.io/${GHCR_OWNER:-th11n}/${GHCR_REPO:-url-shortener}-worker:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/url-shortener
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      RABBITMQ_CLICK_EXCHANGE: clicks
      RABBITMQ_CLICK_QUEUE: clicks.insert.v1
      RABBITMQ_PREFETCH: "50"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: url-shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: docker.io/library/rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
